<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weer & De Lijn Bussen</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 10px;
    }

    .small {
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>

<body>

  <h1>🌤️ Weer & 🚌 De Lijn</h1>

  <!-- WEATHER -->
  <div class="card">
    <h2>Weer (Brussel)</h2>
    <div id="weather">Laden...</div>
    <div class="small">Data via Open-Meteo</div>
  </div>

  <!-- DE LIJN -->
  <div class="card">
    <h2>De Lijn – Halte info</h2>


    <!-- Voorbeeld halte (Brussel regio moet je zelf aanpassen) -->
    <iframe 
      src="https://www.delijn.be/realtime/211085/8">
    </iframe>

  </div>

<script>
async function loadWeather() {
  // Brussel coördinaten
  const url = "https://api.open-meteo.com/v1/forecast?latitude=50.85&longitude=4.35&current_weather=true";

  try {
    const res = await fetch(url);
    const data = await res.json();

    const w = data.current_weather;

    document.getElementById("weather").innerHTML = `
      🌡️ Temperatuur: <b>${w.temperature}°C</b><br>
      💨 Windsnelheid: <b>${w.windspeed} km/u</b><br>
      🕒 Laatste update: ${w.time}
    `;
  } catch (e) {
    document.getElementById("weather").innerText = "Weer kon niet geladen worden.";
  }
}

loadWeather();
setInterval(loadWeather, 600000); // elke 10 min
</script>

</body>
</html>
