<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nog een jaartje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css"/> 
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Fixed Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="header-date-display" id="headerDate"></span>
      </div>
      <h1 class="site-title">Nog een jaartje</h1>
      <div class="header-right">
        <button class="calendar-toggle-btn" id="calendarToggleBtn" title="Kalender openen">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Calendar Overlay -->
  <div class="calendar-overlay" id="calendarOverlay">
    <div class="calendar-panel" id="calendarPanel">
      <div class="calendar-header">
        <button class="cal-nav" id="calPrevMonth">&#8249;</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button class="cal-nav" id="calNextMonth">&#8250;</button>
      </div>
      <div class="cal-weekdays">
        <span>Ma</span><span>Di</span><span>Wo</span><span>Do</span><span>Vr</span><span>Za</span><span>Zo</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <button class="cal-close-btn" id="calCloseBtn">Sluiten</button>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Day stamp / counter -->
    <div class="day-stamp" id="dayStamp">
      <div class="stamp-inner">
        <span class="stamp-number" id="stampNumber">1</span>
        <span class="stamp-label">dag</span>
      </div>
    </div>

    <!-- Navigation arrows -->
    <div class="nav-row">
      <button class="nav-arrow nav-prev" id="navPrev" title="Vorige dag">
        <span class="arrow-icon">&#8592;</span>
        <span class="arrow-label">Vorige</span>
      </button>
      <div class="nav-center-info">
        <span class="nav-date-label" id="navDateLabel"></span>
      </div>
      <button class="nav-arrow nav-next" id="navNext" title="Volgende dag">
        <span class="arrow-label">Volgende</span>
        <span class="arrow-icon">&#8594;</span>
      </button>
    </div>

    <!-- Page content area -->
    <div class="page-card" id="pageCard">
      <div class="page-card-inner" id="pageContent">
        <!-- Content loaded dynamically -->
      </div>
    </div>

    
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <span>Zie je graag ♥</span>
  </footer>

  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
