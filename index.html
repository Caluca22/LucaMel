<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Year Together</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Petal canvas for ambient decoration -->
  <canvas id="petalCanvas"></canvas>

  <!-- Fixed header -->
  <header id="siteHeader">
    <div class="header-inner">
      <div class="header-title">
        <span class="title-main">Our Year Together</span>
        <span class="title-sub">14 June 2025 → 14 June 2026</span>
      </div>
      <div class="header-controls">
        <button class="cal-btn" id="calToggle" aria-label="Open calendar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>Browse days</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Calendar dropdown -->
  <div id="calendarPanel" class="calendar-panel" aria-hidden="true">
    <div class="cal-nav">
      <button id="calPrevMonth" aria-label="Previous month">&#8592;</button>
      <span id="calMonthLabel"></span>
      <button id="calNextMonth" aria-label="Next month">&#8594;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <p class="cal-legend"><span class="dot available"></span> available &nbsp; <span class="dot future"></span> not yet &nbsp; <span class="dot today-dot"></span> today</p>
  </div>
  <div id="calOverlay"></div>

  <!-- Main stage -->
  <main id="stage">

    <!-- Navigation arrows -->
    <button class="nav-arrow left" id="prevBtn" aria-label="Previous day">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <!-- Page card -->
    <div class="card-wrap" id="cardWrap">
      <div class="card" id="pageCard">
        <div class="card-date" id="cardDate"></div>
        <div class="card-content" id="cardContent">
          <!-- Loaded dynamically -->
        </div>
      </div>
    </div>

    <button class="nav-arrow right" id="nextBtn" aria-label="Next day">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

  </main>

  <!-- Locked future page overlay (shown inside card) -->
  <template id="lockedTpl">
    <div class="locked-state">
      <div class="lock-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <p class="locked-msg">This page isn't ready yet.</p>
      <p class="locked-date"></p>
    </div>
  </template>

  <!-- Missing page (no file yet) -->
  <template id="missingTpl">
    <div class="missing-state">
      <p>✦</p>
      <p>Something beautiful is coming here.</p>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
